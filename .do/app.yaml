name: meditation-app
region: nyc
services:
  - name: web
    source_dir: /
    github:
      repo: varunnkrishna/meditation-app
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
